<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Yellow background -->
  <rect width="512" height="512" rx="96" fill="#F7CE6A"/>

  <!-- Chef toque (hat) — white -->
  <g fill="#FAFAFA">
    <ellipse cx="200" cy="125" rx="34" ry="46"/>
    <ellipse cx="256" cy="102" rx="42" ry="58"/>
    <ellipse cx="312" cy="125" rx="34" ry="46"/>
    <rect x="163" y="155" width="186" height="34" rx="6"/>
  </g>
  <!-- Hat details -->
  <line x1="170" y1="172" x2="342" y2="172" stroke="#DCDCDC" stroke-width="2.5"/>
  <g stroke="#E0E0E0" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 200 155 Q 200 130 200 105"/>
    <path d="M 256 155 Q 256 125 256 85"/>
    <path d="M 312 155 Q 312 130 312 105"/>
  </g>

  <!-- Giraffe horns (ossicones) poking OUT through the top of the hat -->
  <g fill="#8B4E2F">
    <!-- Left horn tip + stem -->
    <rect x="182" y="54" width="10" height="36" rx="5"/>
    <circle cx="187" cy="50" r="11"/>
    <!-- Right horn tip + stem -->
    <rect x="320" y="54" width="10" height="36" rx="5"/>
    <circle cx="325" cy="50" r="11"/>
  </g>
  <!-- Tiny shadow where horns emerge from hat, for depth -->
  <g fill="#6B3A1F" opacity="0.35">
    <ellipse cx="187" cy="90" rx="8" ry="3"/>
    <ellipse cx="325" cy="90" rx="8" ry="3"/>
  </g>

  <!-- Ears peeking out from under hat — brown -->
  <g fill="#8B4E2F">
    <ellipse cx="138" cy="188" rx="26" ry="18" transform="rotate(-30 138 188)"/>
    <ellipse cx="374" cy="188" rx="26" ry="18" transform="rotate(30 374 188)"/>
    <!-- Inner ear (pink) -->
    <ellipse cx="138" cy="188" rx="14" ry="9" transform="rotate(-30 138 188)" fill="#F4A0A0" opacity="0.85"/>
    <ellipse cx="374" cy="188" rx="14" ry="9" transform="rotate(30 374 188)" fill="#F4A0A0" opacity="0.85"/>
  </g>

  <!-- Giraffe head — rich brown -->
  <ellipse cx="256" cy="318" rx="140" ry="130" fill="#8B4E2F"/>

  <!-- Snout — lighter brown -->
  <ellipse cx="256" cy="378" rx="85" ry="58" fill="#B87748"/>

  <!-- Classic giraffe spots — darker brown -->
  <g fill="#4F280D" opacity="0.7">
    <ellipse cx="145" cy="330" rx="13" ry="10"/>
    <ellipse cx="367" cy="330" rx="13" ry="10"/>
    <ellipse cx="155" cy="268" rx="9" ry="7"/>
    <ellipse cx="357" cy="268" rx="9" ry="7"/>
    <ellipse cx="200" cy="420" rx="9" ry="7"/>
    <ellipse cx="312" cy="420" rx="9" ry="7"/>
  </g>

  <!-- Eyes -->
  <circle cx="212" cy="303" r="13" fill="#2B2B2B"/>
  <circle cx="300" cy="303" r="13" fill="#2B2B2B"/>
  <!-- Highlights -->
  <circle cx="216" cy="298" r="4.5" fill="#FAFAFA"/>
  <circle cx="304" cy="298" r="4.5" fill="#FAFAFA"/>
  <circle cx="208" cy="307" r="2" fill="#FAFAFA"/>
  <circle cx="296" cy="307" r="2" fill="#FAFAFA"/>

  <!-- Eyelashes -->
  <g stroke="#2B2B2B" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="200" y1="288" x2="196" y2="281"/>
    <line x1="212" y1="286" x2="212" y2="278"/>
    <line x1="224" y1="288" x2="228" y2="281"/>
    <line x1="288" y1="288" x2="284" y2="281"/>
    <line x1="300" y1="286" x2="300" y2="278"/>
    <line x1="312" y1="288" x2="316" y2="281"/>
  </g>

  <!-- Cheeks — bolder pink to pop against brown -->
  <ellipse cx="168" cy="355" rx="20" ry="13" fill="#FF8A8A" opacity="0.5"/>
  <ellipse cx="344" cy="355" rx="20" ry="13" fill="#FF8A8A" opacity="0.5"/>

  <!-- Nostrils -->
  <ellipse cx="240" cy="368" rx="4" ry="6" fill="#2B2B2B"/>
  <ellipse cx="272" cy="368" rx="4" ry="6" fill="#2B2B2B"/>

  <!-- Smile -->
  <path d="M 228 398 Q 256 416 284 398" stroke="#2B2B2B" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="256" cy="408" rx="6" ry="3.5" fill="#FF8A8A"/>
</svg>
